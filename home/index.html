<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Redirecting…</title>

  <!-- Avoid duplicate indexing -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Instant redirect -->
  <meta http-equiv="refresh" content="0; url=/" />

  <link rel="canonical" href="https://ommanicollective.com/" />
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D39WZF9YYE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-D39WZF9YYE');
  const themeToggleBtn = document.getElementById('theme-toggle');
const rootElement = document.documentElement;

// Check for saved user preference or system preference
const savedTheme = localStorage.getItem('theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
  rootElement.setAttribute('data-theme', 'dark');
  themeToggleBtn.setAttribute('aria-pressed', 'true');
  themeToggleBtn.setAttribute('aria-label', 'Enable light mode');
} else {
  rootElement.setAttribute('data-theme', 'light');
}

themeToggleBtn.addEventListener('click', () => {
  const currentTheme = rootElement.getAttribute('data-theme');
  let newTheme = 'light';
  let newAriaPressed = 'false';
  let newAriaLabel = 'Enable dark mode';

  if (currentTheme === 'light') {
    newTheme = 'dark';
    newAriaPressed = 'true';
    newAriaLabel = 'Enable light mode';
  }

  rootElement.setAttribute('data-theme', newTheme);
  themeToggleBtn.setAttribute('aria-pressed', newAriaPressed);
  themeToggleBtn.setAttribute('aria-label', newAriaLabel);
  localStorage.setItem('theme', newTheme);
});
</script>
<body>
  <p>Redirecting to <a href="/">home</a>…</p>
</body>
</html>
